<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>付款流水</title>
  <style>
    body { font-family: sans-serif; padding: 16px; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; align-items: center; }
    .status { color: #666; margin-bottom: 8px; min-height: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f5f5f5; }
  </style>
</head>
<body>
  <section data-app="transactions">
    <h1>付款流水</h1>
    <div class="controls">
      <select data-tx-type>
        <option value="all">全部</option>
        <option value="income">收入</option>
        <option value="expense">支出</option>
      </select>
      <button data-tx-apply>筛选</button>
      <span data-tx-summary></span>
    </div>
    <div class="status" data-tx-status>准备加载...</div>
    <table>
      <thead>
        <tr>
          <th>流水ID</th>
          <th>类型</th>
          <th>金额</th>
          <th>时间</th>
          <th>备注</th>
        </tr>
      </thead>
      <tbody data-tx-rows></tbody>
    </table>
  </section>

  <script src="./shared/apps.js"></script>
  <script>
    window.BusinessApps.mountTransactions(document.querySelector('[data-app="transactions"]'));
  </script>
</body>
</html>
