<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>库存表</title>
  <style>
    body { font-family: sans-serif; padding: 16px; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .status { color: #666; margin-bottom: 8px; min-height: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f5f5f5; }
    .low { color: #c62828; font-weight: 600; }
    .high { color: #2e7d32; font-weight: 700; }
  </style>
</head>
<body>
  <section data-app="inventory">
    <h1>库存表</h1>
    <div class="controls">
      <input data-inv-keyword placeholder="搜索商品名" />
      <select data-inv-range>
        <option value="all">全部库存</option>
        <option value="low">低库存</option>
        <option value="mid">中库存</option>
        <option value="high">高库存</option>
      </select>
      <button data-inv-apply>筛选</button>
    </div>
    <div class="status" data-inv-status>准备加载...</div>
    <table>
      <thead>
        <tr>
          <th>商品名</th>
          <th>价格</th>
          <th>库存</th>
          <th>分类</th>
        </tr>
      </thead>
      <tbody data-inv-rows></tbody>
    </table>
  </section>

  <script src="./shared/apps.js"></script>
  <script>
    window.BusinessApps.mountInventory(document.querySelector('[data-app="inventory"]'));
  </script>
</body>
</html>
